<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <defs>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#FFFF80"/>
      <line x1="0" y1="0" x2="4" y2="4" stroke="#B8B000" stroke-width="1"/>
      <line x1="4" y1="0" x2="0"  y2="4" stroke="#B8B000" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Tab (cream, top-left) -->
  <polygon points="2,11 2,7 13,7 15,11" fill="#FFFFCC" stroke="#000000" stroke-width="1"/>
  <!-- Folder body with crosshatch fill -->
  <rect x="1" y="10" width="29" height="19" fill="url(#hatch)" stroke="#000000" stroke-width="1"/>
  <!-- Top edge overlap to close tab/body join -->
  <line x1="15" y1="11" x2="30" y2="11" stroke="#000000" stroke-width="1"/>
</svg>
